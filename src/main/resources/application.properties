spring.application.name=zemli-bot
spring.main.web-application-type=none
spring.config.import=optional:file:.env[.properties]

telegram.bot.username=${BOT_USERNAME:${TELEGRAM_BOT_USERNAME:ZemliGameBot}}
telegram.bot.token=${BOT_TOKEN:${TELEGRAM_BOT_TOKEN:}}

game.group-chat-id=${GROUP_CHAT_ID:0}
game.time-zone=${GAME_TIME_ZONE:UTC}
game.admin-ids=${ADMIN_IDS:}

spring.datasource.url=${DATABASE_URL:${JDBC_DATABASE_URL:}}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-timeout=3000
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.continue-on-error=true

logging.level.root=INFO
logging.level.com.zemli.bot=INFO
