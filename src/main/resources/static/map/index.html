<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Zemli - Карта мира</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="hud" id="hudTop">
    <div class="hud-title">🗺️ ZEMLI</div>
    <div class="hud-meta">
      <span id="biomeInfo">Равнина</span>
      <span id="coords">X: 0, Y: 0</span>
      <span id="modeInfo">Режим: наблюдение</span>
    </div>
  </div>

  <div class="build-panel" id="buildPanel">
    <div class="panel-title">🏗️ Постройки</div>
    <div class="panel-buttons">
      <button class="emoji-btn build-btn" data-type="capitol" title="Ратуша">🏰</button>
      <button class="emoji-btn build-btn" data-type="lumber" title="Лесопилка">🪓</button>
      <button class="emoji-btn build-btn" data-type="mine" title="Шахта">⛏️</button>
      <button class="emoji-btn build-btn" data-type="farm" title="Ферма">🌾</button>
      <button class="emoji-btn build-btn" data-type="barracks" title="Казарма">⚔️</button>
      <button class="emoji-btn build-btn" data-type="wall" title="Стена">🧱</button>
      <button class="emoji-btn build-btn" data-type="tower" title="Вышка">🗼</button>
      <button class="emoji-btn build-btn" data-type="gold" title="Золотая шахта">💰</button>
      <button class="emoji-btn build-btn" data-type="stable" title="Конюшня">🐎</button>
      <button class="emoji-btn build-btn" data-type="library" title="Библиотека">📚</button>
      <button class="emoji-btn build-btn" data-type="tavern" title="Таверна">🍺</button>
    </div>
  </div>

  <div class="army-panel" id="armyPanel">
    <div class="panel-header">
      <div class="panel-title">⚔️ Войска</div>
      <button class="panel-toggle" data-panel="armyPanel" title="Свернуть/развернуть">▾</button>
    </div>
    <div class="army-modes">
      <button class="army-mode-btn active" id="armyModeRecruit">➕ Нанять</button>
      <button class="army-mode-btn" id="armyModeMove">↔️ Переместить</button>
    </div>
    <div class="panel-buttons">
      <button class="emoji-btn unit-btn" data-unit="infantry" title="Пехота">🛡️</button>
      <button class="emoji-btn unit-btn" data-unit="archer" title="Лучники">🏹</button>
      <button class="emoji-btn unit-btn" data-unit="cavalry" title="Кавалерия">🐎</button>
      <button class="emoji-btn unit-btn" data-unit="hero" title="Герои">🧙</button>
    </div>
  </div>

  <div class="action-panel" id="actionPanel">
    <button class="action-btn" id="actionBuild">🏗️ Построить</button>
    <button class="action-btn" id="actionMove">🚚 Переместить</button>
    <button class="action-btn" id="actionAttack">⚔️ Атака</button>
    <button class="action-btn" id="actionHome">🏠 Домой</button>
    <button class="action-btn cancel" id="actionCancel">❌ Отмена</button>
  </div>

  <div class="zoom-panel">
    <button id="zoomIn">＋</button>
    <button id="zoomOut">－</button>
  </div>

  <canvas id="gameCanvas"></canvas>

  <script src="script.js"></script>
</body>
</html>
